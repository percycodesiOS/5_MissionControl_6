<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#04070B">
<title>MISSION CONTROL · ECMS · EMBRACE THE CHALLENGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04070B;
  --hull:#0B1219;
  --hull-2:#0E1722;
  --line:rgba(0,229,255,.22);
  --line-dim:rgba(0,229,255,.10);
  --ion:#00E5FF;
  --ion-dim:rgba(0,229,255,.45);
  --current:#3E6BFF;
  --tank:#C44DFF;
  --flare:#FFB13B;
  --burn:#FF3B57;
  --grow:#3BFF8E;
  --text:#E8F6FA;
  --text-dim:#7FA3B0;
  --display:'Chakra Petch',system-ui,sans-serif;
  --body:'Lexend',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--void);
  color:var(--text);
  font-family:var(--body);
  overflow-x:hidden;
  min-height:100vh;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,.07), transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 110%, rgba(62,107,255,.05), transparent 60%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:radial-gradient(rgba(0,229,255,.045) 1px, transparent 1px);
  background-size:34px 34px;
  pointer-events:none;z-index:0;
}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ---------- shared ---------- */
.eyebrow{
  font-family:var(--display);
  font-size:clamp(.62rem,1.6vw,.78rem);
  font-weight:600;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:var(--text-dim);
}
.screen-title{
  font-family:var(--display);font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  font-size:clamp(1.3rem,4.5vw,2rem);margin:8px 0 18px;
}
.btn{
  font-family:var(--display);
  font-weight:600;
  letter-spacing:.14em;
  text-transform:uppercase;
  background:transparent;
  color:var(--ion);
  border:1px solid var(--line);
  border-radius:6px;
  padding:.8em 1.4em;
  font-size:clamp(.72rem,1.8vw,.88rem);
  cursor:pointer;
  transition:background .15s,box-shadow .15s,color .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{background:rgba(0,229,255,.08);box-shadow:0 0 18px rgba(0,229,255,.18)}
.btn:focus-visible{outline:2px solid var(--ion);outline-offset:3px}
.btn.primary{background:rgba(0,229,255,.12);border-color:var(--ion);box-shadow:0 0 24px rgba(0,229,255,.22)}
.btn.primary:hover{background:rgba(0,229,255,.2)}
.btn.ghost{color:var(--text-dim);border-color:rgba(127,163,176,.3)}
.btn.ghost:hover{color:var(--text);background:rgba(127,163,176,.08);box-shadow:none}
.btn.danger{color:var(--burn);border-color:rgba(255,59,87,.4)}
.btn.danger:hover{background:rgba(255,59,87,.1);box-shadow:0 0 18px rgba(255,59,87,.15)}
.btn:disabled{opacity:.35;cursor:default;box-shadow:none}
.btn:disabled:hover{background:transparent}
.actions{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap}
.note{font-size:.78rem;color:var(--text-dim);margin-top:14px;line-height:1.6}

/* ---------- HOME ---------- */
.home{max-width:1080px;width:100%;margin:0 auto;padding:clamp(20px,5vw,56px) clamp(16px,4vw,40px) 80px}
.brand{margin-bottom:clamp(20px,4vw,32px)}
.brand-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand h1{
  font-family:var(--display);
  font-weight:700;
  font-size:clamp(2rem,7vw,4.2rem);
  letter-spacing:.06em;
  line-height:1.02;
  color:var(--text);
  margin-top:6px;
}
.brand h1 .ion{color:var(--ion);text-shadow:0 0 30px rgba(0,229,255,.5)}
.brand .sub{margin-top:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand .sub .dot{width:5px;height:5px;border-radius:50%;background:var(--ion);box-shadow:0 0 8px var(--ion)}
.id-edit{
  background:none;border:1px solid var(--line-dim);border-radius:6px;cursor:pointer;
  font-family:var(--display);font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-dim);padding:7px 11px;transition:color .15s,border-color .15s;white-space:nowrap;
}
.id-edit:hover{color:var(--ion);border-color:var(--line)}

.section-label{margin:clamp(24px,4vw,40px) 0 14px;display:flex;align-items:center;gap:14px}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.mission-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.card{
  background:linear-gradient(160deg,var(--hull),var(--hull-2));
  border:1px solid var(--line-dim);
  border-radius:10px;
  padding:20px 20px 16px;
  cursor:pointer;
  text-align:left;
  color:var(--text);
  font-family:var(--body);
  transition:border-color .15s,box-shadow .15s,transform .15s;
  position:relative;
  overflow:hidden;
}
.card:hover{border-color:var(--line);box-shadow:0 0 28px rgba(0,229,255,.12);transform:translateY(-2px)}
.card:focus-visible{outline:2px solid var(--ion);outline-offset:3px}
.card .theme{
  display:inline-block;
  font-family:var(--display);font-size:.62rem;font-weight:600;
  letter-spacing:.26em;text-transform:uppercase;
  color:var(--ion);
  border:1px solid var(--line);
  border-radius:4px;padding:4px 9px;margin-bottom:14px;
}
.card .chip-row .theme{margin-bottom:0}
.card.broadcast .theme{color:var(--current);border-color:rgba(62,107,255,.4)}
.card.tank .theme{color:var(--tank);border-color:rgba(196,77,255,.4)}
.card h3{font-family:var(--display);font-weight:600;font-size:1.18rem;letter-spacing:.04em;margin-bottom:8px}
.card .meta{font-size:.8rem;color:var(--text-dim);display:flex;gap:14px;flex-wrap:wrap}
.card .meta b{color:var(--text);font-weight:600}
.card .phasebar{display:flex;gap:3px;margin-top:16px;height:4px}
.card .phasebar span{border-radius:2px;background:var(--ion-dim)}
.card.broadcast .phasebar span{background:rgba(62,107,255,.55)}
.card.tank .phasebar span{background:rgba(196,77,255,.55)}
.card .edit-link{
  position:absolute;top:14px;right:14px;
  font-family:var(--display);font-size:.6rem;font-weight:600;letter-spacing:.2em;
  color:var(--text-dim);background:none;border:none;cursor:pointer;padding:6px;
}
.card .edit-link:hover{color:var(--ion)}
.card .mini-emblems{display:flex;gap:7px;margin-top:16px;align-items:center;min-height:26px;flex-wrap:wrap}
.card .mini-emblems svg{width:26px;height:26px;display:block}
.card .mini-emblems .empty{font-size:.78rem;color:var(--text-dim)}
.new-mission{
  border:1px dashed rgba(0,229,255,.3);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  min-height:130px;
  color:var(--text-dim);
  font-family:var(--display);font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:.8rem;
}
.new-mission:hover{color:var(--ion);transform:none}

.band-filter{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:20px 0 4px}
.band-filter .bf-label{font-family:var(--display);font-size:.62rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--text-dim);margin-right:6px}
.band-btn{font-family:var(--display);font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:.72rem;
  background:transparent;color:var(--text-dim);border:1px solid var(--line-dim);border-radius:99px;padding:0 1.1em;min-height:40px;
  display:inline-flex;align-items:center;cursor:pointer;transition:color .15s,border-color .15s,background .15s;-webkit-tap-highlight-color:transparent}
.band-btn:hover{color:var(--text);border-color:var(--line)}
.band-btn.on{color:var(--ion);border-color:var(--ion);background:rgba(0,229,255,.1);box-shadow:0 0 16px rgba(0,229,255,.15)}
.chip-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.band-chip{font-family:var(--display);font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--flare);border:1px solid rgba(255,177,59,.4);border-radius:4px;padding:4px 8px;white-space:nowrap}

/* ---------- RUNNER ---------- */
.runner{flex:1;display:flex;flex-direction:column;min-height:100vh}
.hud{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px clamp(14px,3vw,28px);
  border-bottom:1px solid var(--line-dim);
  flex-wrap:wrap;
}
.hud .left,.hud .right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hud .mission-name{font-family:var(--display);font-weight:600;letter-spacing:.12em;text-transform:uppercase;font-size:clamp(.78rem,2.2vw,.95rem)}
.pill{
  font-family:var(--display);font-size:clamp(.6rem,1.8vw,.72rem);font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;
  border:1px solid var(--line);border-radius:99px;
  padding:6px 14px;color:var(--ion);
  background:rgba(0,229,255,.05);
  white-space:nowrap;
}
.pill.run{cursor:pointer;user-select:none}
.pill.run:hover{background:rgba(0,229,255,.14)}
.pill.onair{color:var(--burn);border-color:rgba(255,59,87,.5);background:rgba(255,59,87,.07);display:flex;align-items:center;gap:8px}
.pill.onair .blink{width:7px;height:7px;border-radius:50%;background:var(--burn);box-shadow:0 0 10px var(--burn)}
.running .pill.onair .blink{animation:blink 1.1s infinite}
.pill.tankpill{color:var(--tank);border-color:rgba(196,77,255,.5);background:rgba(196,77,255,.07)}
@keyframes blink{0%,55%{opacity:1}56%,100%{opacity:.25}}
.hud .exit{font-size:.68rem;padding:.6em 1em}

.stage{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(12px,3vw,30px) clamp(14px,4vw,40px);
  gap:clamp(10px,2vh,22px);
  text-align:center;
}
.phase-eyebrow{display:flex;align-items:center;gap:14px;color:var(--ion);letter-spacing:.4em}
.phase-eyebrow::before,.phase-eyebrow::after{content:'';width:34px;height:1px;background:var(--line)}
.phase-name{
  font-family:var(--display);font-weight:700;
  font-size:clamp(1.5rem,5.5vw,3.1rem);
  letter-spacing:.1em;text-transform:uppercase;
}
.instruction{
  max-width:880px;
  font-size:clamp(1.02rem,2.9vw,1.55rem);
  font-weight:500;
  line-height:1.55;
  color:var(--text);
}
.challenge-link{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;
  max-width:780px;
  border:1px solid rgba(255,177,59,.42);
  border-radius:12px;
  background:linear-gradient(150deg, rgba(255,177,59,.12), rgba(255,177,59,.03));
  padding:13px clamp(16px,3vw,22px);
  text-align:left;
}
.challenge-link .cl-tag{
  font-family:var(--display);font-size:clamp(.56rem,1.5vw,.66rem);font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--flare);white-space:nowrap;display:flex;align-items:center;gap:8px;flex:none;
}
.challenge-link .cl-tag .cl-dot{width:7px;height:7px;border-radius:50%;background:var(--flare);box-shadow:0 0 9px var(--flare)}
.challenge-link .cl-text{font-size:clamp(.9rem,2.2vw,1.12rem);color:var(--text);line-height:1.45;font-weight:500;flex:1;min-width:200px}
.pill.theme-pill{color:var(--flare);border-color:rgba(255,177,59,.42);background:rgba(255,177,59,.07)}
.midrow{display:flex;align-items:center;justify-content:center;gap:clamp(14px,4vw,44px);flex-wrap:wrap}
.ring-wrap{position:relative;width:clamp(240px,42vmin,420px);aspect-ratio:1;margin:clamp(4px,1vh,12px) 0}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);overflow:visible}
.ring-wrap .timebox{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.timer{
  font-family:var(--display);font-weight:700;
  font-size:clamp(3.4rem,12vmin,6.6rem);
  letter-spacing:.04em;
  font-variant-numeric:tabular-nums;
  color:var(--ion);
  text-shadow:0 0 36px rgba(0,229,255,.45);
  line-height:1;
  transition:color .3s;
}
.timer.flare{color:var(--flare);text-shadow:0 0 36px rgba(255,177,59,.45)}
.timer.burn{color:var(--burn);text-shadow:0 0 36px rgba(255,59,87,.5)}
.running .timer.burn{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.timer-label{font-family:var(--display);font-size:clamp(.58rem,1.6vw,.72rem);font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:var(--text-dim)}
.next-up{font-size:clamp(.8rem,2.2vw,.95rem);color:var(--text-dim)}
.next-up b{color:var(--text);font-weight:600}

.phase-track{display:flex;gap:6px;width:min(880px,92%);margin-top:4px}
.phase-track .seg{
  flex-grow:1;height:7px;border-radius:4px;
  background:rgba(0,229,255,.12);
  position:relative;overflow:hidden;
}
.phase-track .seg .fill{position:absolute;inset:0;width:0%;background:var(--ion);border-radius:4px;box-shadow:0 0 10px rgba(0,229,255,.5)}
.phase-track .seg.done .fill{width:100%;background:rgba(0,229,255,.35);box-shadow:none}

/* schematic / diagram slot */
.schematic{
  position:relative;border:1px solid var(--line-dim);border-radius:10px;
  background:rgba(0,229,255,.03);padding:14px;cursor:zoom-in;
  transition:border-color .15s, box-shadow .15s;
}
.schematic:hover{border-color:var(--line);box-shadow:0 0 22px rgba(0,229,255,.12)}
.schematic img{display:block;max-width:min(440px,78vw);max-height:clamp(150px,30vmin,300px);object-fit:contain}
.schematic .tag{
  position:absolute;top:-9px;left:12px;background:var(--void);padding:0 8px;
  font-family:var(--display);font-size:.56rem;font-weight:600;letter-spacing:.26em;
  color:var(--text-dim);text-transform:uppercase;
}
.schematic::before,.schematic::after{content:'';position:absolute;width:14px;height:14px;border:2px solid var(--ion);opacity:.55}
.schematic::before{left:-2px;bottom:-2px;border-top:none;border-right:none;border-radius:0 0 0 6px}
.schematic::after{right:-2px;top:-2px;border-bottom:none;border-left:none;border-radius:0 6px 0 0}
.viewer{
  position:fixed;inset:0;z-index:60;background:rgba(4,7,11,.93);
  display:none;align-items:center;justify-content:center;padding:4vmin;cursor:zoom-out;
}
.viewer.show{display:flex}
.viewer img{max-width:92vw;max-height:88vh;object-fit:contain;filter:drop-shadow(0 0 30px rgba(0,229,255,.18))}

/* side rail (broadcast rundown + tank queue) */
.broadcast-layout{display:flex;flex:1;min-height:0}
.rundown{
  width:min(310px,34vw);
  border-right:1px solid var(--line-dim);
  padding:18px 14px;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:8px;
}
.rundown .rd-title{margin-bottom:6px}
.rd-item{
  border:1px solid transparent;border-radius:8px;
  padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;
  color:var(--text-dim);font-size:.84rem;
}
.rd-item .nm{font-weight:600;display:flex;flex-direction:column;gap:2px;text-align:left}
.rd-item .role{font-family:var(--display);font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--current)}
.rd-item .tm{font-family:var(--display);font-variant-numeric:tabular-nums;font-size:.78rem}
.rd-item .ob{display:flex;align-items:center;gap:10px;min-width:0}
.rd-item .ob svg{width:30px;height:30px;flex:none;display:block}
.rd-item .tag{font-family:var(--display);font-size:.55rem;font-weight:600;letter-spacing:.22em;color:var(--text-dim);white-space:nowrap}
.rd-item.done{opacity:.38;text-decoration:line-through}
.rd-item.live{
  border-color:rgba(62,107,255,.55);
  background:rgba(62,107,255,.1);
  color:var(--text);
  box-shadow:0 0 18px rgba(62,107,255,.15);
}
.mode-tank .rd-item.live{
  border-color:rgba(196,77,255,.55);
  background:rgba(196,77,255,.1);
  box-shadow:0 0 18px rgba(196,77,255,.15);
}
.mode-tank .rd-item.ondeck{border-color:rgba(196,77,255,.25)}
.mode-tank .rd-item.ondeck .tag{color:var(--tank)}
@media (max-width:760px){
  .broadcast-layout{flex-direction:column}
  .rundown{width:100%;border-right:none;border-bottom:1px solid var(--line-dim);flex-direction:row;overflow-x:auto;padding:12px}
  .rd-item{min-width:160px;flex-direction:column;align-items:flex-start}
}

/* broadcast accent */
.runner.mode-broadcast .timer{color:var(--current);text-shadow:0 0 36px rgba(62,107,255,.45)}
.runner.mode-broadcast .timer.flare{color:var(--flare);text-shadow:0 0 36px rgba(255,177,59,.45)}
.runner.mode-broadcast .timer.burn{color:var(--burn);text-shadow:0 0 36px rgba(255,59,87,.5)}
.runner.mode-broadcast .phase-eyebrow{color:var(--current)}
.runner.mode-broadcast .phase-track .seg .fill{background:var(--current);box-shadow:0 0 10px rgba(62,107,255,.5)}

/* tank accent */
.runner.mode-tank .timer{color:var(--tank);text-shadow:0 0 36px rgba(196,77,255,.45)}
.runner.mode-tank .timer.flare{color:var(--flare);text-shadow:0 0 36px rgba(255,177,59,.45)}
.runner.mode-tank .timer.burn{color:var(--burn);text-shadow:0 0 36px rgba(255,59,87,.5)}
.runner.mode-tank .phase-eyebrow{color:var(--tank)}
.runner.mode-tank .phase-track .seg .fill{background:var(--tank);box-shadow:0 0 10px rgba(196,77,255,.5)}
.team-hero{display:flex;align-items:center;justify-content:center;gap:clamp(12px,3vw,26px);flex-wrap:wrap}
.team-hero .emb svg{width:clamp(64px,13vmin,118px);height:auto;display:block}
.team-name{
  font-family:var(--display);font-weight:700;
  font-size:clamp(2rem,9vw,4.8rem);
  letter-spacing:.07em;text-transform:uppercase;line-height:1.05;
  max-width:min(900px,92vw);overflow-wrap:break-word;
  text-shadow:0 0 44px rgba(196,77,255,.45);
}

.deck{
  display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
  padding:18px clamp(14px,3vw,28px) max(20px, env(safe-area-inset-bottom));
  border-top:1px solid var(--line-dim);
}
.deck .btn{min-width:104px}
.deck .btn.big{min-width:150px;padding:1em 1.6em}

/* phase clear flash */
.flash{
  position:fixed;inset:0;z-index:50;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,229,255,.08);
  opacity:0;
}
.flash.show{animation:flashIn .9s ease}
@keyframes flashIn{0%{opacity:0}18%{opacity:1}100%{opacity:0}}
.flash .msg{
  font-family:var(--display);font-weight:700;font-size:clamp(1.6rem,7vw,3.6rem);
  letter-spacing:.3em;text-transform:uppercase;color:var(--ion);
  text-shadow:0 0 50px rgba(0,229,255,.8);
}

/* complete */
.complete{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px;text-align:center}
.complete .big{
  font-family:var(--display);font-weight:700;font-size:clamp(2rem,8vw,4.4rem);
  letter-spacing:.16em;text-transform:uppercase;color:var(--ion);
  text-shadow:0 0 50px rgba(0,229,255,.55);
}
.mode-tank .complete .big{color:var(--tank);text-shadow:0 0 50px rgba(196,77,255,.55)}
.complete .crew{font-size:clamp(.95rem,2.6vw,1.2rem);color:var(--text-dim)}
.complete .crew b{color:var(--text)}
.complete .creed{max-width:560px;font-size:clamp(.95rem,2.4vw,1.15rem);color:var(--text);line-height:1.55}

/* ---------- CHECK-IN ---------- */
.checkin{max-width:860px;width:100%;margin:0 auto;padding:clamp(20px,5vw,48px) clamp(16px,4vw,32px) 90px}
.ci-row{display:flex;gap:10px;flex-wrap:wrap}
.ci-row input{
  flex:1;min-width:220px;
  font-family:var(--display);font-weight:600;font-size:clamp(1rem,3vw,1.3rem);
  letter-spacing:.08em;text-transform:uppercase;
  background:var(--hull);border:1px solid var(--line-dim);border-radius:10px;

<script>
/* ==============================================================
   MISSION CONTROL  ·  ECMS  ·  PercyCodes  ·  2026-2027 SEASON
   Building theme: EMBRACE THE CHALLENGE.
   One self-contained page. Runs a 35-minute lesson, a morning
   broadcast, or a CIRC Tank pitch competition. Built to read from
   across the room. Every phase names how it embraces the challenge.
   Voice rule: launch-ops vernacular kids know. No em dashes.
   ============================================================== */

const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = s => {
  s = Math.max(0, Math.round(s));
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
};
const fmtMin = t => t%1===0 ? t : t.toFixed(1);

/* ---------- emblem generator (deterministic from team name) ---------- */
const NEON = ['#00E5FF','#3E6BFF','#C44DFF','#3BFF8E','#FFB13B','#FF4D88'];
function hashStr(s){
  let h = 2166136261; s = s.toUpperCase();
  for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function initialsOf(name){
  const parts = name.trim().split(/[^A-Za-z0-9]+/).filter(Boolean);
  let s = '';
  if(parts.length >= 2) s = parts.slice(0,3).map(p=>p[0]).join('');
  else if(parts.length === 1) s = parts[0].slice(0,2);
  return (s || 'X').toUpperCase();
}
function polyPts(cx,cy,r,n,rot){
  const pts=[];
  for(let i=0;i<n;i++){ const a=rot+i*2*Math.PI/n; pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1)); }
  return pts.join(' ');
}
function starPts(cx,cy,r1,r2,n,rot){
  const pts=[];
  for(let i=0;i<n*2;i++){ const r=i%2?r2:r1, a=rot+i*Math.PI/n; pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1)); }
  return pts.join(' ');
}
function emblemSVG(name){
  const h = hashStr(name);
  const col = NEON[h % NEON.length];
  const ringStyle = (h>>>3) % 4;
  const sides = 3 + ((h>>>6) % 5);
  const isStar = ((h>>>9) % 4) === 0;
  const rot = ((h>>>11) % 360) * Math.PI/180;
  const dots = 1 + ((h>>>16) % 4);
  const dotOff = ((h>>>20) % 360) * Math.PI/180;
  const ini = initialsOf(name);
  const fs = ini.length >= 3 ? 20 : (ini.length === 2 ? 25 : 31);
  let ring = '';
  if(ringStyle===0) ring = `<circle cx="60" cy="60" r="52" stroke="${col}" stroke-width="3" fill="none"/>`;
  if(ringStyle===1) ring = `<circle cx="60" cy="60" r="52" stroke="${col}" stroke-width="3" fill="none" stroke-dasharray="14 8"/>`;
  if(ringStyle===2) ring = `<circle cx="60" cy="60" r="52" stroke="${col}" stroke-width="2.5" fill="none"/><circle cx="60" cy="60" r="45" stroke="${col}" stroke-width="1.2" fill="none" opacity=".55"/>`;
  if(ringStyle===3) ring = `<circle cx="60" cy="60" r="52" stroke="${col}" stroke-width="4" fill="none" stroke-dasharray="2.5 7"/>`;
  const core = isStar
    ? `<polygon points="${starPts(60,60,34,15,5,rot)}" stroke="${col}" stroke-width="2.5" fill="${col}" fill-opacity=".07" stroke-linejoin="round"/>`
    : `<polygon points="${polyPts(60,60,32,sides,rot)}" stroke="${col}" stroke-width="2.5" fill="${col}" fill-opacity=".07" stroke-linejoin="round"/>`;
  let dd = '';
  for(let i=0;i<dots;i++){
    const a = dotOff + i*2*Math.PI/dots;
    dd += `<circle cx="${(60+52*Math.cos(a)).toFixed(1)}" cy="${(60+52*Math.sin(a)).toFixed(1)}" r="4" fill="${col}"/>`;
  }
  return `<svg viewBox="0 0 120 120" role="img" aria-label="${esc(name)} emblem">
    <g style="filter:drop-shadow(0 0 5px ${col})">${ring}${core}${dd}
      <text x="60" y="60" text-anchor="middle" dominant-baseline="central" dy=".04em"
        font-family="'Chakra Petch',sans-serif" font-weight="700" font-size="${fs}"
        letter-spacing="1" fill="${col}">${esc(ini)}</text>
    </g></svg>`;
}

    <rect x="14" y="120" width="74" height="64" opacity=".5"/>

/* ---------- default missions: the 2026-2027 starter season ---------- */
/* Each lesson runs to 35 minutes and asks for productive struggle:
   build, test, fail forward, rebuild, show what got better.
   Edit freely. Changes save to this device. */
const DEFAULT_MISSIONS = [
  {
    id:'m56coaster', type:'lesson', title:'COASTER TRACKS', theme:'PUSH + ROLL', band:'5-6', arc:3,
    loadout:['Foam pipe insulation halves or card strips per team','Tape and scissors per table','One marble per team','A loop and a landing cup as the goal'],
    phases:[
      {name:'MISSION BRIEF', minutes:5, text:'Your mission: build a coaster track where the marble survives one full loop and still lands in the cup. Start height is your energy budget. Spend it wisely.', challenge:'Too little height stalls the loop, too much launches the marble into orbit. Tuning is the job.'},
      {name:'BUILD WINDOW', minutes:18, text:'Build the track section by section: drop, loop, runout. Test each section before connecting. Adjust start height and loop size until the marble makes it around.', challenge:'A stalled loop is not a fail, it is a measurement. Raise the start and read the result.'},
      {name:'FULL RUNS', minutes:8, text:'Three official runs, full track, marble must complete the loop and land in the cup. Loop plus landing is the only score that counts.', challenge:'Consistency is the real test. One lucky run proves nothing, three clean runs prove design.'},
      {name:'RESET + RECOVER', minutes:4, text:'Track apart, insulation stacked by length, marbles counted in, tape in the trash. Sit when your zone is clear.', challenge:'Strike the set like a pro crew. Clean, counted, fast.'}
    ]
  },
  {
    id:'m56hoop', type:'lesson', title:'HOOP GLIDERS', theme:'FLIGHT', band:'5-6', arc:4,
    loadout:['Straws, card strips, and tape per builder','A launch line and a distance tape','A target ring at mid range','Recovery bin for gliders'],
    phases:[

/* ---------- identity (editable, persisted) ---------- */
const IDENT_KEY = 'missionControl.identity.v1';
const DEFAULT_IDENTITY = {
  school:'EHRMAN CREST',
  group:'CIRC · GRADES K-6',
  teacher:'MR. MACEK',
  room:'',
  seasonLabel:'2026 / 2027 SEASON',
  seasonTheme:'EMBRACE THE CHALLENGE',
  seasonCreed:'Productive struggle is the point. We build, we test, we fail forward, and we make it better. Every mission this year asks you to take on something hard and grow from it.'
};
function loadIdentity(){
  try{
    const raw = localStorage.getItem(IDENT_KEY);
    if(!raw) return {...DEFAULT_IDENTITY};
    const d = JSON.parse(raw);
    return {...DEFAULT_IDENTITY, ...d};
  }catch(err){ return {...DEFAULT_IDENTITY}; }
}
function saveIdentity(){
  try{ localStorage.setItem(IDENT_KEY, JSON.stringify(identity)); }catch(err){}
}
let identity = loadIdentity();

/* ---------- persistence: missions (localStorage) ---------- */
const STORE_KEY = 'missionControl.missions.v3';
const OLD_STORE_KEY = 'missionControl.missions.v2';
function defaultMissions(){ return JSON.parse(JSON.stringify(DEFAULT_MISSIONS)); }
function isValidMission(m){
  return m && typeof m==='object'
    && typeof m.id==='string'
    && Array.isArray(m.phases) && m.phases.length>0
    && m.phases.every(p=>p && typeof p.name==='string' && typeof p.minutes==='number');
}
function loadMissions(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw){
      const old = localStorage.getItem(OLD_STORE_KEY);
      if(old){
        try{
          const prev = JSON.parse(old);
          if(Array.isArray(prev)){
            const defIds = new Set(DEFAULT_MISSIONS.map(m=>m.id));
            const custom = prev.filter(m=>isValidMission(m) && !defIds.has(m.id));
            const merged = defaultMissions().concat(custom);
            localStorage.setItem(STORE_KEY, JSON.stringify(merged));
            return merged;
          }
        }catch(e2){}
      }
      return defaultMissions();
    }
    const data = JSON.parse(raw);
    if(Array.isArray(data) && data.length && data.every(isValidMission)) return data;
    return defaultMissions();
  }catch(err){ return defaultMissions(); }
}
function saveMissions(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(missions)); }catch(err){}
}
function resetMissionsToDefaults(){
  if(!confirm('Reset all missions back to the built-in starter season? Your custom missions and edits will be erased.')) return;
  try{ localStorage.removeItem(STORE_KEY); }catch(err){}
  missions = defaultMissions();
  screen='home'; render();
}
let missions = loadMissions();
let teams = [];
let homeBand = 'ALL';

/* ---------- audio ---------- */
let actx = null, soundOn = true;
function audio(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(freq, t0, dur, gainV=0.12, type='sine'){
  const ctx = audio();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, ctx.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(gainV, ctx.currentTime + t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t0 + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(ctx.currentTime + t0); o.stop(ctx.currentTime + t0 + dur + 0.05);
}
const sfx = {
  launch(){ if(!soundOn) return; tone(330,0,.18,.09); tone(494,.1,.22,.09); tone(740,.22,.3,.1); },
  chime(){ if(!soundOn) return; tone(740,0,.28); tone(1175,.16,.4); },
  tick(){ if(!soundOn) return; tone(1568,0,.07,.05,'square'); },
  done(){ if(!soundOn) return; tone(659,0,.25); tone(880,.18,.25); tone(1319,.36,.6); }
};

/* ---------- state ---------- */
let screen = 'home';     // home | runner | editor | checkin | loadout | settings
let R = null;            // runner state
let editing = null;      // editor working copy
let lo = null;           // loadout working state
let ci = null;           // check-in working state
let ciErr = '';
let tickHandle = null, lastTs = null;

/* ---------- mission flow ---------- */
function startMission(id){
  const m = missions.find(x=>x.id===id);
  if(!m) return;
  if(m.type==='tank'){ openCheckin(id); return; }
  if(m.loadout && m.loadout.length){ openLoadout(id); return; }
  startRunner(id);
}

function startRunner(missionId){
  const m = missions.find(x=>x.id===missionId);
  if(!m) return;
  R = {
    m: JSON.parse(JSON.stringify(m)),
    phase: 0,
    remaining: m.phases[0].minutes*60,
    curDur: m.phases[0].minutes*60,
    running: false,
    run: 1,
    finished: false,
    lastWholeSec: null
  };
  if(m.type==='tank'){
    R.teams = teams.map(t=>({...t}));
    R.teamIdx = 0;
    R.standby = true;
  }
  screen = 'runner';
  render();
}

function setPhase(idx){
  R.phase = idx;
  R.remaining = R.m.phases[idx].minutes*60;
  R.curDur = R.remaining;
  R.lastWholeSec = null;
  lastTs = null;
}

function loop(ts){
  if(!R || !R.running){ lastTs = null; return; }
  if(lastTs === null) lastTs = ts;
  const dt = (ts - lastTs)/1000;
  lastTs = ts;
  R.remaining -= dt;

  const whole = Math.ceil(R.remaining);
  if(whole !== R.lastWholeSec){
    R.lastWholeSec = whole;
    if(whole <= 5 && whole > 0) sfx.tick();
    updateTimerDom();
  } else {
    updateRingDom();
  }

  if(R.remaining <= 0){ phaseDone(); return; }
  tickHandle = requestAnimationFrame(loop);
}

function setRunning(v){
  if(!R || R.finished) return;
  R.running = v;
  lastTs = null;
  if(v){
    audio();
    if(R.standby){ R.standby = false; sfx.launch(); render(); }
    tickHandle = requestAnimationFrame(loop);
  } else if(tickHandle){ cancelAnimationFrame(tickHandle); }
  renderRunnerControls();
  document.querySelector('.runner')?.classList.toggle('running', v);
}

function phaseDone(){
  cancelAnimationFrame(tickHandle);
  const tank = R.m.type==='tank';
  const lastPhase = R.phase >= R.m.phases.length - 1;

  if(tank){
    if(lastPhase){
      if(R.teamIdx >= R.teams.length - 1){
        R.finished = true; R.running = false;
        sfx.done(); flash('TANK CLEAR'); render();
      } else {
        sfx.chime(); flash('PITCH COMPLETE');
        R.teamIdx++; R.running = false; R.standby = true;
        setPhase(0); render();
      }
    } else {
      sfx.chime();
      setPhase(R.phase + 1);
      flash(R.m.phases[R.phase].name);
      render();
      tickHandle = requestAnimationFrame(loop);
    }
    return;
  }

  if(lastPhase){
    R.finished = true; R.running = false;
    sfx.done();
    flash(R.m.type==='broadcast' ? 'OFF AIR' : 'MISSION COMPLETE');
    render();
  } else {
    sfx.chime();
    flash('PHASE CLEAR');
    setPhase(R.phase + 1);
    render();
    tickHandle = requestAnimationFrame(loop);
  }
}

function flash(msg){
  const f = document.getElementById('flash');
  document.getElementById('flashMsg').textContent = msg;
  f.classList.remove('show'); void f.offsetWidth; f.classList.add('show');
}

function plusMinute(){
  if(!R||R.finished) return;
  R.remaining += 60; R.curDur += 60; R.m.phases[R.phase].minutes += 1;
  render();
  if(R.running){ lastTs=null; tickHandle=requestAnimationFrame(loop); }
}
function skipPhase(){ if(!R||R.finished) return; R.remaining = 0; phaseDone(); }
function resetMission(keepRun){
  if(!R) return;
  const id = R.m.id, run = keepRun ? R.run : 1;
  cancelAnimationFrame(tickHandle);
  startRunner(id);
  R.run = run;
  render();
}
function nextCrew(){ const r = R.run; const mx = R.m.runs||13; resetMission(true); R.run = Math.min(mx, r+1); render(); }

/* ---------- ring geometry ---------- */
function ringSVG(){
  const Rad = 100, C = 2*Math.PI*Rad;
  const total = R.m.phases.reduce((a,p)=>a+p.minutes,0);
  const gapFrac = 0.018;
  const gaps = R.m.phases.length * gapFrac;
  let acc = 0, segs = '';
  const liveCol = R.m.type==='broadcast' ? '#3E6BFF' : (R.m.type==='tank' ? '#C44DFF' : '#00E5FF');
  const doneCol = R.m.type==='broadcast' ? 'rgba(62,107,255,.4)' : (R.m.type==='tank' ? 'rgba(196,77,255,.4)' : 'rgba(0,229,255,.4)');
  R.m.phases.forEach((p,i)=>{
    const frac = (p.minutes/total) * (1 - gaps);
    const len = frac * C, off = -(acc * C);
    let col = 'rgba(0,229,255,.14)', w = 7;
    if(i < R.phase){ col = doneCol; }
    segs += `<circle cx="110" cy="110" r="${Rad}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${off}"></circle>`;
    if(i === R.phase){
      const dur = p.minutes*60;
      const prog = Math.min(1, Math.max(0, (dur - R.remaining)/dur));
      segs += `<circle id="liveArc" data-start="${acc}" data-frac="${frac}" cx="110" cy="110" r="${Rad}" fill="none"
        stroke="${liveCol}" stroke-width="${w}" stroke-linecap="round"
        style="filter:drop-shadow(0 0 8px ${liveCol})"
        stroke-dasharray="${len*prog} ${C-len*prog}" stroke-dashoffset="${off}"></circle>`;
    }
    acc += frac + gapFrac;
  });
  return `<svg viewBox="0 0 220 220" aria-hidden="true">${segs}</svg>`;
}
function updateRingDom(){
  const arc = document.getElementById('liveArc');
  if(!arc || !R) return;
  const Rad = 100, C = 2*Math.PI*Rad;
  const frac = parseFloat(arc.dataset.frac);
  const p = R.m.phases[R.phase], dur = p.minutes*60;
  const prog = Math.min(1, Math.max(0,(dur - R.remaining)/dur));
  const len = frac*C*prog;
  arc.setAttribute('stroke-dasharray', `${len} ${C-len}`);
}
function updateTimerDom(){
  const t = document.getElementById('timer');
  if(!t || !R) return;
  t.textContent = fmt(R.remaining);
  t.classList.toggle('flare', R.remaining<=60 && R.remaining>10);
  t.classList.toggle('burn', R.remaining<=10);
  updateRingDom();
  document.querySelectorAll('.phase-track .seg').forEach((el,i)=>{
    el.classList.toggle('done', i < R.phase);
    const fill = el.querySelector('.fill');
    if(i===R.phase){
      const dur = R.m.phases[i].minutes*60;
      fill.style.width = `${Math.min(100,(dur-R.remaining)/dur*100)}%`;
    } else if(i>R.phase){ fill.style.width='0%'; }
  });
  document.querySelectorAll('.rd-item').forEach((el,i)=>{
    el.classList.toggle('live', i===R.phase);
    el.classList.toggle('done', i<R.phase);
  });
}

  return `

}

  const teamHero = isTank ? `

    body = `<div class="broadcast-layout">
      <div class="rundown">

/* ==============================================================
   ROSTER + ACCOUNTS + RECORDS  (cross-day tracking)
   --------------------------------------------------------------
   HONEST NOTE ON STORAGE. This layer keeps classes, students, and
   records in THIS browser via localStorage. That means it works
   offline and persists across days on this device, and it is great
   for a shared sign-in station (one tablet at the door). It does
   NOT sync across devices on its own. For students on their own
   phones at the same time, and for one pooled set of records, you
   need a backend. Firebase is the plan in the project brief.

   Everything reads and writes through the Store object below, so
   the swap is contained: reimplement Store.read / Store.write to
   talk to Firestore, sign students in with Firebase Auth (or, once
   your district approves it, Microsoft or Clever SSO), and call
   render() from a Firestore snapshot listener so every device sees
   changes live. The screens and data model do not change.
   ============================================================== */
const Store = {
  read(key, fallback){ try{ const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }catch(e){ return fallback; } },
  write(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }
};
const CLASSES_KEY = 'missionControl.classes.v1';
const RECORDS_KEY = 'missionControl.records.v1';
const SESSION_KEY = 'missionControl.session.v1';
let classes = Store.read(CLASSES_KEY, []);
let records = Store.read(RECORDS_KEY, []);
let session = Store.read(SESSION_KEY, null);   // {classId, studentId} signed-in student
let roster = {};      // roster screen working state
let join = null;      // student join flow
let logState = null;  // log screen working state
let pendingLog = null;
let recordsView = {classId:'all'};
function saveClasses(){ Store.write(CLASSES_KEY, classes); }
function saveRecords(){ Store.write(RECORDS_KEY, records); }
function saveSession(){ Store.write(SESSION_KEY, session); }

const uid = () => 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const todayKey = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const prettyDay = k => { const [y,m,d]=k.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); };
function genCode(){ const a='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<4;i++) s+=a[Math.floor(Math.random()*a.length)]; return s; }
function findClass(id){ return classes.find(c=>c.id===id); }
function findStudent(c, sid){ return c ? (c.students||[]).find(s=>s.id===sid) : null; }
function currentStudent(){ if(!session) return null; const c=findClass(session.classId); return c ? findStudent(c, session.studentId) : null; }
function cloudNoteHTML(){ return `<div class="cloud-note"><b>Where this data lives:</b> records save to this device only, which is ideal for one shared sign-in station. To sync across phones and pool every class in one place, connect a backend (Firebase, per your project plan). District sign-in (Microsoft or Clever) needs your IT team to approve the app first, so until then keep it to first names plus a 4-digit code, with no emails or passwords.</div>`; }
function download(filename, text, type){ const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},120); }

    </div>
    <div class="actions" style="margin-top:6px">
      <button class="btn" onclick="exportCSV()" ${list.length?'':'disabled'}>EXPORT CSV</button>
      <button class="btn ghost" onclick="exportJSON()" ${records.length?'':'disabled'}>EXPORT JSON</button>
    </div>
    ${list.length ? groupedLogs(list, true) : '<p class="note">No entries yet for this view. Students log their builds after a mission.</p>'}
    ${cloudNoteHTML()}
  </div>`;
}
function csvCell(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function exportCSV(){
  const rows=[['date','class','student','mission','built_or_tried','what_broke','what_changed']];
  let list=records.slice(); if(recordsView.classId!=='all') list=list.filter(r=>r.classId===recordsView.classId);
  list.sort((a,b)=>a.ts-b.ts);
  list.forEach(r=>{ const m=r.meta||{}; rows.push([r.date, (findClass(r.classId)||{}).name||'', r.studentName||'', r.missionTitle||'', m.tried||'', m.broke||'', m.changed||'']); });
  download('mission-control-records.csv', rows.map(row=>row.map(csvCell).join(',')).join('\n'), 'text/csv');
}
function exportJSON(){ download('mission-control-records.json', JSON.stringify(records,null,2), 'application/json'); }

/* ---------- keyboard ---------- */
document.addEventListener('keydown', e=>{
  if(screen!=='runner' || !R || R.finished) return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.code==='Space'){ e.preventDefault(); setRunning(!R.running); }
  if(e.key==='n'||e.key==='N'){ skipPhase(); }
});

if(session && currentStudent()) screen='studenthome';
render();
</script>
</body>
</html>
